<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exchange Market - Pi RPG</title>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>

  <!-- main styles + bourse scoped styles -->
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/bourse.css">
  <link rel="stylesheet" href="/css/scroll-banner.css" />
</head>

<body class="bourse-page">
  <!-- Balance -->
  <div id="soldeContainer" class="balance-container">
    <div class="balance-box">
      <span>Balance:</span>
      <span id="soldeAmount">0</span>
      <img src="icons/pigold2.png" alt="Pi Coin" class="pi-icon" />
    </div>

    <!-- Faucet button (reuses site btn-primary) -->
    <button id="faucetBtn" class="btn-primary" title="Claim free Pi (once per 24h)" aria-label="Claim faucet">
      Claim Faucet
    </button>
  </div>

  <!-- Exchange Market & Inventory -->
  <main class="page-wrapper">
<img src="/Assets/LogoPi2.png" alt="Exchange Market Logo" class="hero-logo" />

    <div class="layout">
      <!-- Market -->
      <section class="panel market-panel">
        <h2 class="panel-title">Market</h2>
        <div id="bourseContainer" class="market-grid"></div>
      </section>

      <!-- Inventory -->
      <aside class="panel inventory-panel">
        <h2 class="panel-title">Your Inventory</h2>

        <div id="venteContainer" class="sell-panel">
          <h3 class="sell-title">Put an item up for sale</h3>
          <form id="venteForm" class="sell-form">
            <div class="field">
              <label for="itemSelect">Item</label>
              <select id="itemSelect" class="field-input"></select>
            </div>

            <div class="field">
              <label for="quantityInput">Quantity</label>
              <input id="quantityInput" type="number" min="1" class="field-input" />
            </div>

            <div class="field">
              <label for="priceInput">Price</label>
              <div class="input-with-icon">
                <input id="priceInput" type="number" min="1" class="field-input" />
                <img src="icons/pigold2.png" alt="Pi Coin" class="pi-icon-small" />
              </div>
            </div>

            <div class="field action-field">
              <button type="submit" class="btn-secondary">Sell</button>
            </div>
          </form>
        </div>

        <div id="inventaireContainer" class="inventaire-grid"></div>
      </aside>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Scripts -->
  <script src="js/firebase.js"></script>
  <script src="js/faucet.js"></script>
  <script src="js/inventaire.js"></script>
  <script src="js/bourse.js"></script>
  <script src="js/main.js"></script>

  <script>
    // only show demo/fallback items when there is no real data
    (function () {
      const container = document.getElementById('bourseContainer');
      const hasRealBourse = window.bourse && Object.keys(window.bourse).length > 0;
      const hasRealItems = window.items && Object.keys(window.items).length > 0;
      if (hasRealBourse || hasRealItems) return;

      function formatPi(amount) {
        return `${amount} <img src="icons/pigold2.png" class="pi-icon" alt="Pi Coin">`;
      }

      function showToast(message, amount = null) {
        const toast = document.getElementById("toast");
        toast.innerHTML = amount ? `${message} ${formatPi(amount)}` : message;
        toast.classList.add('toast--visible');
        setTimeout(() => { toast.classList.remove('toast--visible'); }, 2500);
      }

      const fakeItems = [
        { name: "Iron Sword", price: 100 },
        { name: "Healing Potion", price: 45 },
        { name: "Magic Ring", price: 250 },
      ];

      fakeItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "market-card";
        div.innerHTML = `
          <div class="market-card-title">${item.name}</div>
          <div class="market-card-price">${formatPi(item.price)}</div>
          <button class="btn-primary btn-small">Buy</button>
        `;
        container.appendChild(div);
      });

      setTimeout(() => showToast("Welcome to the Pi RPG Exchange!"), 2000);
    })();
  </script>
</body>
</html>
