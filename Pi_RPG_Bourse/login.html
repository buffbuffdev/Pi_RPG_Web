<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi RPG Exchange - Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-database-compat.js"></script>

  <!-- Custom palette -->
  <link rel="stylesheet" href="/css/palette.css" />
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Icon -->
  <link rel="icon" href="/assets/LogoPi2.png" type="image/png" />

  <style>
    body {
    background: 
      linear-gradient(135deg, rgba(30,30,50,0.85), rgba(60,30,80,0.85)),
      url('/assets/bg_exchange.png') center/cover no-repeat;      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--color-text-light);
      animation: fadeIn 0.8s ease forwards;
      padding-top: 8rem;
    }

    
    /* === Card === */
    .auth-card {
      background: var(--color-bg-card);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 400px;
      box-shadow: 0 0 40px var(--color-shadow-card);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 0.8s ease forwards;
    }

    /* === Logo & Title === */
    .logo {
      width: 90px;
      margin-bottom: 1.5rem;
    }
    h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem;
      color: var(--color-primary);
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* === Inputs styled like DialogBox === */
    .input-box {
      background: url('/assets/DialogBox.png') center center / 100% 100% no-repeat;
      border: none;
      border-radius: 12px;
      color: var(--color-primary2);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 1em 1.5em;
      width: 100%;
      min-height: 56px;
      margin-bottom: 1rem;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-box input {
      background: transparent;
      border: none;
      width: 100%;
      color: var(--color-primary2);
      text-align: center;
      outline: none;
      font-family: inherit;
      font-weight: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
      font-size: 1rem;
    }

    .input-box input::placeholder {
      color: var(--color-primary);
      opacity: 0.8;
    }

    .input-box input:focus {
      filter: brightness(1.15) drop-shadow(0 0 10px var(--color-primary-light));
    }

    /* === Buttons === */
    .btn-primary {
      background: url('/assets/DialogBox.png') center center / 100% 100% no-repeat;
      border: none;
      border-radius: 12px;
      min-height: 56px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 1em 2em;
      color: var(--color-primary2);
      cursor: pointer;
      transition: transform 0.2s, filter 0.2s;
    }

    .btn-primary:hover {
      filter: brightness(1.2) drop-shadow(0 0 10px var(--color-primary-light));
      transform: scale(1.05);
    }

    /* === Toggle switch === */
    .switch {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
    }

    .switch button {
      color: var(--color-primary2);
      text-decoration: underline;
      background: none;
      border: none;
      cursor: pointer;
    }

    /* === Animations === */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* === Responsive === */
    @media (max-width: 480px) {
      .auth-card {
        width: 90%;
        padding: 2rem 1.5rem;
      }
      h2 { font-size: 1.6rem; }
      .btn-primary, .input-box { padding: 0.9em 1.2em; }
    }
  </style>
</head>

<body>
  <div id="scroll-banner-container"></div>
  <script src="/js/scroll-banner.js"></script>

  <div class="auth-card">
    <img src="/assets/LogoPi2.png" alt="Pi RPG Logo" class="logo" />
    <h2 id="formTitle"></h2>

    <!-- Login -->
    <form id="loginForm" class="flex flex-col w-full">
      <div class="input-box"><input id="loginPseudo" type="text" placeholder="Username" required /></div>
      <div class="input-box"><input id="loginEmail" type="email" placeholder="Email" required /></div>
      <div class="input-box"><input id="loginPassword" type="password" placeholder="Password" required /></div>
      <button type="submit" class="btn-primary mt-2">Login</button>
    </form>

    <!-- Signup (hidden by default) -->
    <form id="signupForm" class="hidden flex flex-col w-full">
      <div class="input-box"><input id="signupPseudo" type="text" placeholder="Username" required /></div>
      <div class="input-box"><input id="signupEmail" type="email" placeholder="Email" required /></div>
      <div class="input-box"><input id="signupPassword" type="password" placeholder="Password" required /></div>
      <div class="input-box"><input id="signupConfirm" type="password" placeholder="Confirm Password" required /></div>
      <button type="submit" class="btn-primary mt-2">Create Account</button>
    </form>

    <div class="switch">
      <p id="switchText">
        Don't have an account? 
        <button id="toggleForm">Create one</button>
      </p>
    </div>
  </div>

  <script src="js/firebase.js"></script>
  <script>
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");
    const toggleBtn = document.getElementById("toggleForm");
    const title = document.getElementById("formTitle");
    const switchText = document.getElementById("switchText");

    // ✅ Toggle between forms
    toggleBtn.addEventListener("click", (e) => {
      e.preventDefault();
      const isLogin = !loginForm.classList.contains("hidden");
      loginForm.classList.toggle("hidden");
      signupForm.classList.toggle("hidden");
      title.textContent = isLogin ? "" : "";
      switchText.innerHTML = isLogin
        ? `Already have an account? <button id="toggleForm">Sign in</button>`
        : `Don't have an account? <button id="toggleForm">Create one</button>`;
      document.getElementById("toggleForm").addEventListener("click", (e) => toggleBtn.click());
    });

    // ✅ Firebase Auth
    firebase.auth().onAuthStateChanged(user => {
      if (user) window.location.href = "soon.html";
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = loginForm.loginEmail.value;
      const password = loginForm.loginPassword.value;

      try {
        await firebase.auth().signInWithEmailAndPassword(email, password);
      } catch (error) {
        alert(error.message);
      }
    });

    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = signupForm.signupEmail.value;
      const password = signupForm.signupPassword.value;
      const confirm = signupForm.signupConfirm.value;
      const pseudo = signupForm.signupPseudo.value;

      if (password !== confirm) return alert("Passwords do not match.");

      try {
        const userCred = await firebase.auth().createUserWithEmailAndPassword(email, password);
        await firebase.database().ref("users/" + userCred.user.uid).set({
          username: pseudo,
          email: email,
          createdAt: Date.now()
        });
        alert("Account created successfully!");
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>
